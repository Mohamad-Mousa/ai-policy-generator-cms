<div class="card border-0 shadow-sm h-100">
  <div class="card-body">
    <div class="d-flex flex-wrap align-items-start justify-content-between gap-3 mb-4">
      <div>
        <p class="text-uppercase text-muted fw-semibold small mb-1">Catalogue</p>
        <h2 class="h4 mb-0">Subdomains</h2>
        <p class="text-muted mb-0 small">
          View and manage subdomains across all domains. Use the filter to focus on one domain.
        </p>
      </div>
      <div class="d-flex flex-wrap gap-2">
        <a routerLink="/dashboard/domains" class="btn btn-sm btn-outline-secondary d-inline-flex align-items-center gap-1">
          <span class="material-symbols-rounded" style="font-size: 1.125rem">arrow_back</span>
          <span>Back to Domains</span>
        </a>
        <app-button
          label="Add subdomain"
          size="sm"
          variant="primary"
          icon="add"
          [functionKey]="functionKey"
          [privilegeAccess]="writePrivilege"
          (click)="openCreateSubdomain()"
        ></app-button>
      </div>
    </div>

    <div class="mb-3 d-flex flex-wrap align-items-center gap-2">
      <label class="text-muted small mb-0 text-uppercase fw-semibold" for="subdomainDomainFilter">
        Domain filter
      </label>
      <select
        id="subdomainDomainFilter"
        class="form-select form-select-sm"
        style="max-width: 280px"
        [disabled]="domainsLoading()"
        [value]="domainFilterId()"
        (change)="onDomainFilterChange($any($event.target).value)"
      >
        <option value="">All domains</option>
        @for (d of allDomains(); track d._id) {
          <option [value]="d._id">{{ d.title }}</option>
        }
      </select>
    </div>

    <app-table
      [columns]="columns"
      [rows]="tableRows()"
      [totalCount]="totalCount()"
      [showActions]="true"
      [enableFilters]="true"
      [enableSorting]="true"
      [enablePagination]="true"
      [loading]="tableLoading() || domainsLoading()"
      loadingLabel="Loading subdomains..."
      [functionKey]="functionKey"
      [excludedActions]="excludedActions"
      [serverSideSearch]="true"
      [serverSideFilters]="true"
      [sortBy]="sortBy"
      [sortDirection]="sortDirection"
      [currentPageInput]="currentPageValue"
      [pageSizeInput]="currentLimitValue"
      (pageChange)="onPageChange($event)"
      (limitChange)="onLimitChange($event)"
      (searchChange)="onSearchChange($event)"
      (filterChange)="onFilterChange($event)"
      (sortChange)="onSortChange($event)"
      (updateAction)="onUpdate($event)"
      (deleteAction)="onDelete($event)"
    ></app-table>
  </div>
</div>

<app-dialog
  [open]="isFormDialogOpen"
  [title]="formDialogTitle"
  [description]="formDialogDescription"
  width="480px"
  (closed)="closeFormDialog()"
>
  <form dialog-body [formGroup]="subdomainForm" class="form-grid">
    <app-form-input
      [control]="domainIdControl"
      formControlName="domainId"
      label="Domain"
      type="select"
      [options]="domainSelectOptionsForInput"
      [required]="true"
    ></app-form-input>

    <app-form-input
      [control]="titleControl"
      formControlName="title"
      label="Title"
      type="text"
      placeholder="Enter subdomain title"
      [required]="true"
      [minlength]="2"
    ></app-form-input>

    <div class="checkbox-field">
      <span class="field-label">Active</span>
      <div class="checkbox-wrapper">
        <input type="checkbox" formControlName="isActive" id="subdomainPageIsActive" />
        <label for="subdomainPageIsActive" class="checkbox-text">Enable this subdomain</label>
      </div>
    </div>
  </form>

  <div dialog-footer>
    <app-button
      label="Cancel"
      variant="text"
      [disabled]="dialogLoading()"
      (clicked)="closeFormDialog()"
    ></app-button>
    <app-button
      [label]="formSubmitLabel"
      variant="primary-gradient"
      [loading]="dialogLoading()"
      [disabled]="dialogLoading()"
      [functionKey]="functionKey"
      [privilegeAccess]="isEditMode ? PrivilegeAccess.U : writePrivilege"
      (clicked)="onSubmitForm()"
    ></app-button>
  </div>
</app-dialog>

<app-dialog
  [open]="isDeleteDialogOpen"
  title="Delete subdomain"
  description="This action cannot be undone."
  width="460px"
  (closed)="closeDeleteDialog()"
>
  <div dialog-body>
    <div class="d-flex align-items-start gap-3">
      <div class="text-danger">
        <span class="material-symbols-rounded" style="font-size: 2rem">warning</span>
      </div>
      <div>
        <p class="fw-semibold mb-1">Delete this subdomain?</p>
        @if (subdomainToDelete) {
          <p class="text-muted mb-0">
            <strong>{{ subdomainToDelete.title }}</strong> will be permanently removed.
          </p>
        }
      </div>
    </div>
  </div>

  <div dialog-footer>
    <app-button
      label="Cancel"
      variant="text"
      [disabled]="deleteDialogLoading()"
      (clicked)="closeDeleteDialog()"
    ></app-button>
    <app-button
      [label]="deleteButtonLabel"
      variant="danger-gradient"
      [loading]="deleteDialogLoading()"
      [disabled]="deleteDialogLoading()"
      [functionKey]="functionKey"
      [privilegeAccess]="deletePrivilege"
      (clicked)="confirmDelete()"
    ></app-button>
  </div>
</app-dialog>
